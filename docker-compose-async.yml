version: '3.8'

services:
  # Redis - Required for queue and caching
  redis:
    image: redis:7-alpine
    container_name: whatsapp-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      - REDIS_APPENDONLY=yes

  # Postgres - Database (if using local Postgres)
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp-ai-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-whatsapp_ai}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Main application server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-app
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Server
      PORT: 3000
      NODE_ENV: development

      # Database
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-whatsapp_ai}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_RPS: 2
      GEMINI_MAX_BURST: 3
      GEMINI_BASE_DELAY: 1000
      GEMINI_MAX_DELAY: 30000
      GEMINI_MAX_RETRIES: 5

      # Workers
      CHAT_WORKER_CONCURRENCY: 5
      WHATSAPP_WORKER_CONCURRENCY: 10

      # Monitoring
      QUEUE_MONITOR_INTERVAL: 30000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start

  # Standalone worker process (optional, for testing horizontal scaling)
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-worker-1
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-whatsapp_ai}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_RPS: 2
      GEMINI_MAX_BURST: 3

      # Workers
      CHAT_WORKER_CONCURRENCY: 5
      WHATSAPP_WORKER_CONCURRENCY: 10
    volumes:
      - .:/app
      - /app/node_modules
    command: node src/workers/worker-process.js --worker-id=1

  # Redis UI (optional, for debugging)
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
