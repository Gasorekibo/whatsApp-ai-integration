version: '3.8'

services:
  # Redis - Required for queues and caching
  redis:
    image: redis:7-alpine
    container_name: whatsapp-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      - REDIS_APPENDONLY=yes
    command: redis-server --appendonly yes
    networks:
      - whatsapp-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp-ai-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: whatsapp_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-network

  # Main Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-app
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Server
      PORT: 3000
      NODE_ENV: development

      # Database
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/whatsapp_ai
      PG_DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/whatsapp_ai
      PGSSLMODE: disable

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      REDIS_DB: 0

      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_RPS: 2
      GEMINI_MAX_BURST: 3
      GEMINI_BASE_DELAY: 1000
      GEMINI_MAX_DELAY: 30000
      GEMINI_MAX_RETRIES: 5

      # Workers
      CHAT_WORKER_CONCURRENCY: 5
      WHATSAPP_WORKER_CONCURRENCY: 10

      # Monitoring
      QUEUE_MONITOR_INTERVAL: 30000

      # Other required vars
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:3000/oauth/callback

    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - whatsapp-network
    command: npm start

  # Worker Process 1
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-worker-1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/whatsapp_ai
      PG_DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/whatsapp_ai
      PGSSLMODE: disable

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      REDIS_DB: 0

      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_RPS: 2
      GEMINI_MAX_BURST: 3
      GEMINI_BASE_DELAY: 1000
      GEMINI_MAX_DELAY: 30000
      GEMINI_MAX_RETRIES: 5

      # Workers
      CHAT_WORKER_CONCURRENCY: 5
      WHATSAPP_WORKER_CONCURRENCY: 10

      # Other required vars
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - whatsapp-network
    command: node src/workers/worker-process.js --worker-id=1

  # Worker Process 2
  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-worker-2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/whatsapp_ai
      PG_DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/whatsapp_ai
      PGSSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_RPS: 2
      GEMINI_MAX_BURST: 3
      CHAT_WORKER_CONCURRENCY: 5
      WHATSAPP_WORKER_CONCURRENCY: 10
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - whatsapp-network
    command: node src/workers/worker-process.js --worker-id=2

  # Redis UI (Optional - for debugging queues)
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - whatsapp-network

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  whatsapp-network:
    driver: bridge
